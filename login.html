<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QueueFlow Login</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #e1bee7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #7b1fa2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>

  <script>
    // already logged in → go to index
    if(localStorage.getItem("isLoggedIn") === "true") {
      window.location.href = "index.html";
    }
  </script>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
  function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if((user === "admin" || user === "user") && pass === "1234") {

      // ✅ STORE LOGIN STATE
      localStorage.setItem("isLoggedIn", "true");

      // ✅ DIRECT REDIRECT (no delay)
      window.location.href = "index.html";

    } else {
      document.getElementById("msg").innerText = "Invalid Credentials";
    }
  }
</script>

</body>
</html>
