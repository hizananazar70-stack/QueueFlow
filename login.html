<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #e1bee7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 35px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #7b1fa2;
      box-shadow: 0 0 5px rgba(123,31,162,0.3);
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: #7b1fa2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #6a1b9a;
      transform: translateY(-1px);
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
    }

    .success { color: green; }
    .error { color: red; }

  </style>
</head>

<body>

<div class="login-box">
  <h2>QueueFlow Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="message"></p>
</div>

<script>
  function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    if(user === "admin" && pass === "1234") {
      msg.innerText = "Admin Login Successful";
      msg.className = "success";

      setTimeout(() => {
        window.location.href = "admin.html";
      }, 1000);

    } 
    else if(user === "user" && pass === "1234") {
      msg.innerText = "User Login Successful";
      msg.className = "success";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);

    } 
    else {
      msg.innerText = "Invalid Credentials";
      msg.className = "error";
    }
  }
</script>

</body>
</html>
