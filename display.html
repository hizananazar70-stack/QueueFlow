<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Display | QueueFlow</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      margin: 0;
      background-color: #121212; /* Deep Dark */
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 3px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .token-container {
      background: #1e1e1e;
      border: 3px solid #007bff;
      border-radius: 30px;
      padding: 50px 100px;
      box-shadow: 0 0 50px rgba(0, 123, 255, 0.2);
    }

    .now-serving {
      font-size: 24px;
      color: #555;
      font-weight: bold;
      margin-bottom: -10px;
    }

    .token-number {
      font-size: 220px;
      font-weight: 900;
      color: #007bff;
      margin: 0;
      text-shadow: 0 0 20px rgba(0, 123, 255, 0.5);
    }

    .home-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #444;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .home-btn:hover { color: #fff; }
  </style>
</head>
<body>
  <a href="index.html" class="home-btn">← Home</a>
  <h1>Status Board</h1>
  <div class="token-container">
    <div class="now-serving">NOW SERVING</div>
    <p class="token-number">103</p>
  </div>
</body>
</html>
